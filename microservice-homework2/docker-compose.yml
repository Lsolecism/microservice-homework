# Nacos 3.0.3 + Sentinel 控制台（镜像使用社区打包的 dashboard:latest）
# 启动：docker compose up -d
# Nacos 控制台：http://127.0.0.1:8848/nacos  （默认 nacos / nacos）
# Sentinel 控制台：http://127.0.0.1:8858     （bladex 镜像常见账号 sentinel / sentinel）

services:
  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: nacos-standalone
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      TZ: Asia/Shanghai
      NACOS_ADMIN_USERNAME: nacos
      NACOS_ADMIN_PASSWORD: nacos
      NACOS_AUTH_IDENTITY_KEY: czx
      NACOS_AUTH_IDENTITY_VALUE: czx
      NACOS_AUTH_TOKEN: 4GyRJeurIEbT4MWQGPRYVbP4cbinJ25V+3rm6UQuh8E=
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-logs:/home/nacos/logs
    restart: unless-stopped

  sentinel-dashboard:
    # 官方 Sentinel 最新稳定版见：https://github.com/alibaba/Sentinel/releases （撰写时为 v1.8.9）
    # Docker Hub 上 bladex/sentinel-dashboard:latest 通常对应该系列的最新构建
    image: mirror.devillusion.asia/bladex/sentinel-dashboard:latest
    container_name: sentinel-dashboard
    ports:
      - "8858:8858"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: >-
        -Dserver.port=8858
        -Dcsp.sentinel.dashboard.server=localhost:8858
    restart: unless-stopped

volumes:
  nacos-logs:
